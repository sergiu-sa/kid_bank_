<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout — KidBank</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0e1419;
        --ink-muted: #4a5862;
        --ink-subtle: #8c99a4;
        --cream: #f3ede0;
        --surface: #ffffff;
        --brand-deep: #002b36;
        --accent: #ff8a1f;
        --success: #1f8a5a;
        --line: rgba(14, 20, 25, 0.08);
        --r-md: 16px;
        --r-lg: 22px;
        --r-pill: 999px;
        --font-display: "Geist", system-ui, sans-serif;
        --font-serif: "Instrument Serif", serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        font-family: var(--font-display);
        background: var(--cream);
        background-image:
          radial-gradient(900px 700px at 110% -10%, rgba(255,138,31,0.10), transparent 60%),
          radial-gradient(900px 700px at -10% 110%, rgba(0,96,110,0.08), transparent 60%);
        margin: 0;
        padding: 32px 20px;
        color: var(--ink);
        min-height: 100vh;
      }

      .container {
        max-width: 520px;
        margin: 32px auto;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--r-lg);
        padding: clamp(24px, 4vw, 40px);
        position: relative;
        box-shadow: 0 24px 60px -20px rgba(0, 43, 54, 0.18);
      }

      /* Receipt notch top */
      .container::before,
      .container::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 14px;
        background-image:
          radial-gradient(circle at 7px 7px, var(--cream) 6px, transparent 7px);
        background-size: 14px 14px;
        background-position: 0 0;
      }
      .container::before { top: -1px; transform: scaleY(-1); }
      .container::after  { bottom: -1px; }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 8px;
      }
      .eyebrow::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }

      h2 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 2rem;
        letter-spacing: -0.02em;
        text-align: left;
        color: var(--ink);
        margin: 0 0 4px;
      }

      h2 em {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 400;
        color: var(--accent);
      }

      .meta-line {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--ink-subtle);
        letter-spacing: 0.06em;
        padding: 14px 0;
        border-bottom: 1px dashed var(--line);
        margin-bottom: 12px;
      }

      .product {
        padding: 14px 0;
        border-bottom: 1px dashed var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
      }

      .product:last-child { border-bottom: 0; }

      .product span:first-child {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 0.95rem;
        color: var(--ink);
      }

      .product strong {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--success);
        background: rgba(31,138,90,0.12);
        padding: 4px 10px;
        border-radius: var(--r-pill);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 24px;
        padding: 10px 20px;
        background: var(--brand-deep);
        color: #fff;
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 0.9rem;
        text-decoration: none;
        border-radius: var(--r-pill);
        transition: background 0.15s ease;
      }

      .back-link:hover {
        background: var(--accent);
        color: var(--brand-deep);
      }

      #productList:empty + .back-link { margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="eyebrow">Receipt</span>
      <h2>Ready to <em>checkout</em></h2>
      <div class="meta-line">
        <span>KIDBANK · POCKET</span>
        <span id="dateLine"></span>
      </div>
      <div id="productList"></div>
      <a class="back-link" href="/barcode_scanner.html">← Scan more products</a>
    </div>
    <script>
      // Show today's date in the receipt header
      const dateEl = document.getElementById("dateLine");
      if (dateEl) {
        const d = new Date();
        dateEl.textContent = d.toISOString().slice(0, 10).replace(/-/g, ".");
      }
    </script>

    <script>
      const params = new URLSearchParams(window.location.search);
      const productListContainer = document.getElementById("productList");

      try {
        const productsParam = params.get("products");
        const products = JSON.parse(decodeURIComponent(productsParam));

        if (!Array.isArray(products) || products.length === 0) {
          productListContainer.textContent = "No products scanned.";
        } else {
          products.forEach((product) => {
            const item = document.createElement("div");
            item.className = "product";
            const name = document.createElement("span");
            name.textContent = product.name ?? "Unknown product";
            const status = document.createElement("strong");
            status.textContent = "✅ Allowed";
            item.appendChild(name);
            item.appendChild(status);
            productListContainer.appendChild(item);
          });
        }
      } catch (e) {
        productListContainer.textContent =
          "⚠️ Error reading product list from QR code.";
      }
    </script>
  </body>
</html>
