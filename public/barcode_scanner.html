    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      :root {
        --ink: #0e1419;
        --ink-muted: #4a5862;
        --ink-subtle: #8c99a4;
        --cream: #f3ede0;
        --surface: #ffffff;
        --brand-deep: #002b36;
        --brand: #00606e;
        --accent: #ff8a1f;
        --success: #1f8a5a;
        --danger: #c1284a;
        --line: rgba(14, 20, 25, 0.08);
        --r-md: 16px;
        --r-lg: 22px;
        --r-pill: 999px;
        --font-display: "Geist", system-ui, sans-serif;
        --font-serif: "Instrument Serif", serif;
        --font-mono: "Geist Mono", monospace;
      }

      * { box-sizing: border-box; }

      body {
        font-family: var(--font-display);
        margin: 0;
        padding: 0;
        background: var(--cream);
        background-image:
          radial-gradient(900px 700px at 110% -10%, rgba(255,138,31,0.10), transparent 60%),
          radial-gradient(900px 700px at -10% 110%, rgba(0,96,110,0.08), transparent 60%);
        color: var(--ink);
        min-height: 100vh;
      }

      .scanner-container {
        max-width: 720px;
        margin: 40px auto;
        padding: clamp(20px, 4vw, 36px);
        background: var(--surface);
        border-radius: var(--r-lg);
        border: 1px solid var(--line);
        box-shadow: 0 24px 60px -20px rgba(0, 43, 54, 0.18);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 8px;
      }

      .eyebrow::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 2.4s ease-in-out infinite;
        box-shadow: 0 0 0 4px rgba(255,138,31,0.2);
      }

      @keyframes pulse-dot {
        0%, 100% { box-shadow: 0 0 0 4px rgba(255,138,31,0.2); }
        50%      { box-shadow: 0 0 0 7px rgba(255,138,31,0); }
      }

      h2 {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        letter-spacing: -0.02em;
        line-height: 1.05;
        margin: 0 0 20px;
        color: var(--ink);
      }

      h2 em {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 400;
        color: var(--accent);
      }

      .viewfinder {
        position: relative;
        width: 100%;
        border-radius: var(--r-md);
        overflow: hidden;
        background: var(--brand-deep);
        margin-bottom: 24px;
        aspect-ratio: 4 / 3;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Corner brackets */
      .viewfinder::before,
      .viewfinder::after {
        content: "";
        position: absolute;
        width: 36px;
        height: 36px;
        border: 2px solid var(--accent);
        pointer-events: none;
      }
      .viewfinder::before {
        top: 16px; left: 16px;
        border-right: 0; border-bottom: 0;
        border-top-left-radius: 8px;
      }
      .viewfinder::after {
        bottom: 16px; right: 16px;
        border-left: 0; border-top: 0;
        border-bottom-right-radius: 8px;
      }

      /* Scan line animation */
      .scan-line {
        position: absolute;
        left: 12%;
        right: 12%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        top: 50%;
        animation: scan 2.4s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes scan {
        0%, 100% { transform: translateY(-50px); opacity: 0.6; }
        50%      { transform: translateY(50px);  opacity: 1; }
      }

      .product-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .product-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-radius: var(--r-md);
        border: 1px solid var(--line);
        background: var(--surface);
        font-size: 0.92rem;
        animation: rise-in 0.3s ease-out;
      }

      @keyframes rise-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .product-item span:first-child {
        font-weight: 500;
        color: var(--ink);
      }

      .product-item.restricted {
        background: #fdebef;
        border-color: rgba(193,40,74,0.15);
      }
      .product-item.restricted strong {
        color: var(--danger);
        font-weight: 600;
        font-size: 0.82rem;
        background: rgba(193,40,74,0.12);
        padding: 4px 10px;
        border-radius: var(--r-pill);
      }

      .product-item.allowed strong {
        color: var(--success);
        font-weight: 600;
        font-size: 0.82rem;
        background: rgba(31,138,90,0.12);
        padding: 4px 10px;
        border-radius: var(--r-pill);
      }

      #finish-btn {
        margin-top: 20px;
        padding: 14px 22px;
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        background: var(--brand-deep);
        color: #fff;
        border: 0;
        border-radius: var(--r-md);
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
      }
      #finish-btn:hover {
        background: var(--ink);
        transform: translateY(-1px);
      }

      .qr-container {
        margin-top: 24px;
        text-align: center;
        padding: 22px;
        background: var(--cream);
        border-radius: var(--r-lg);
      }

      .qr-container h3 {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 400;
        font-size: 1.2rem;
        color: var(--ink);
        margin: 0 0 14px;
      }

      .qr-container img,
      .qr-container canvas {
        margin: 0 auto;
        border-radius: 8px;
      }

      @media (max-width: 600px) {
        .product-item { padding: 10px 14px; gap: 12px; }
      }
    </style>
  </head>

      <span class="eyebrow">Scanner</span>
      <h2>Point and <em>scan</em></h2>
      <div class="viewfinder">
        <video id="camera" autoplay muted playsinline></video>
        <div class="scan-line" aria-hidden="true"></div>
      </div>
      <div class="product-list" id="productList"></div>
      <button id="finish-btn">Finish & generate QR</button>
      <div class="qr-container" id="qrContainer"></div>
    </div>

      const scannedProducts = new Map();

      async function startCameraAndScan() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false,
          });
          video.srcObject = stream;

          const barcodeDetector = new BarcodeDetector({
            formats: ["ean_13", "code_128"],
          });

          setInterval(async () => {
            try {
              const barcodes = await barcodeDetector.detect(video);
              if (barcodes.length > 0) {
                const code = barcodes[0].rawValue;
                if (!scannedProducts.has(code)) {
                  const baseURL =
                    location.hostname === "localhost"
                      ? "http://localhost:4000/barcode"
                      : "/.netlify/functions/barcode";

                  const response = await fetch(`${baseURL}/${code}`);
                  if (!response.ok) throw new Error("Product not found");
                  const product = await response.json();

                  const productName =
                    product.product_name || `Unknown Product (${code})`;
                  const isRestricted = restrictedKeywords.some((keyword) =>
                    productName.toLowerCase().includes(keyword)
                  );

                  scannedProducts.set(code, {
                    name: productName,
                    restricted: isRestricted,
                  });
                  updateProductList();
                }
              }
            } catch (err) {
              console.warn("Detection error:", err.message);
            }
          }, 1000);
        } catch (err) {
          console.error("Camera access denied or unavailable:", err);
          alert("Camera access is required to use the barcode scanner.");
        }
      }

      function updateProductList() {
        productList.innerHTML = "";
        scannedProducts.forEach((data, code) => {
          const item = document.createElement("div");
          item.className = `product-item ${
            data.restricted ? "restricted" : "allowed"
          }`;
          item.innerHTML = `
            <span>${data.name}</span>
            <strong>${data.restricted ? "❌ Restricted" : "✅ Allowed"}</strong>
          `;
          productList.appendChild(item);
        });
      }

      finishBtn.addEventListener("click", () => {
        const restrictedItems = Array.from(scannedProducts.values()).filter(
          (p) => p.restricted
        );
        if (restrictedItems.length > 0) {
          alert("Some products are restricted and cannot be purchased.");
          return;
        }

        const allowedProducts = Array.from(scannedProducts.values()).filter(
          (p) => !p.restricted
        );
        if (allowedProducts.length === 0) {
          alert("No allowed products to generate a QR code.");
          return;
        }

        localStorage.setItem(
          "allowedProducts",
          JSON.stringify(allowedProducts)
        );

        const checkoutURL = `${location.origin}/checkout.html?products=${encodeURIComponent(
          JSON.stringify(allowedProducts)
        )}`;
        qrContainer.innerHTML = `<h3>Scan this QR code to proceed to payment</h3>`;
        new QRCode(qrContainer, { text: checkoutURL, width: 150, height: 150 });
      });

      document.addEventListener("DOMContentLoaded", startCameraAndScan);
